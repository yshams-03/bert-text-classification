version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dbpedia-bert-api
    ports:
      - "8000:8000"
    volumes:
      # Mount checkpoints directory for model weights
      - ./checkpoints:/app/checkpoints
      # (Optional) Mount src/ for hot-reload during development:
      # - ./src:/app/src
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    restart: on-failure
    # Uncomment for development with hot-reload:
    # develop:
    #   watch:
    #     - action: sync
    #       path: ./src
    #       target: /app/src
    #       ignore:
    #         - __pycache__
    #     - action: rebuild
    #       path: ./deployment/requirements.txt
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
