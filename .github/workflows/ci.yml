name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: python -m pip install -r deployment/requirements.txt pytest ruff
      - name: Compile source
        run: python -m compileall -q src deployment
      - name: Lint
        run: ruff check src deployment tests
      - name: Test
        run: pytest -q
